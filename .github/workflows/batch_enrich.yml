name: Batch Credit Enrichment Sprint

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Specific YouTube URL to enrich (leave empty to process next batch in DB queue)'
        required: false
        default: ''

jobs:
  enrich-sprint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (FFmpeg & Tesseract)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr libgl1-mesa-glx libglib2.0-0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp paddleocr opencv-python-headless imagehash rapidfuzz pytesseract python-dotenv google-genai requests pillow

      - name: Execute Batch Enrichment Runner
        env:
          # Supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # APIs
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # SmartProxy
          SMARTPROXY_USER: ${{ secrets.SMARTPROXY_USER }}
          SMARTPROXY_PASS: ${{ secrets.SMARTPROXY_PASS }}
          SMARTPROXY_HOST: ${{ secrets.SMARTPROXY_HOST }}
          SMARTPROXY_PORT: ${{ secrets.SMARTPROXY_PORT }}
        run: |
          if [ "${{ github.event.inputs.target_url }}" != "" ]; then
            echo "🎥 Starting enrichment for target URL: ${{ github.event.inputs.target_url }}"
            npx tsx scripts/batch_enrich_credits.ts "${{ github.event.inputs.target_url }}"
          else
            echo "🚀 Starting standard batch enrichment sprint..."
            npx tsx scripts/batch_enrich_credits.ts
          fi
