name: Lumi Data Sync

on:
  schedule:
    # 6:00 AM WAT (UTC+1) = 5:00 AM UTC (Cinemas - Daily)
    - cron: '0 5 * * *'
    # YouTube Sync: 3 times a day (every 8 hours)
    - cron: '0 */8 * * *'
    # 10:00 AM WAT (UTC+1) = 9:00 AM UTC (TMDB/Kava - Daily)
    - cron: '0 9 * * *'
    # AI Maintenance: Twice a day (every 12 hours)
    - cron: '0 2,14 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - showtimes
          - videos
          - tmdb
          - feed_kappa
          - feed_gamma
          - feed_delta
          - feed_zeta
          - ai_maintenance
          - credits_enrichment

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      BASE_URL: 'https://muvidb.com'
      CRON_SECRET: ${{ secrets.VITE_CRON_SECRET }}
    
    steps:
      - name: Fix Git Permissions
        run: git config --global --add safe.directory "*"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify Environment
        run: |
          echo "Checking Secrets Presence..."
          if [ -z "$CRON_SECRET" ]; then echo "❌ CRON_SECRET is MISSING"; else echo "✅ CRON_SECRET is set"; fi
          if [ -z "${{ secrets.FIRECRAWL_API_KEY }}" ]; then echo "❌ FIRECRAWL_API_KEY is MISSING"; else echo "✅ FIRECRAWL_API_KEY is set"; fi
          echo "Base URL: $BASE_URL"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Sync Cinemas (6 AM Local)
        if: github.event.schedule == '0 5 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'showtimes'))
        run: |
          echo "Syncing Cinemas (Local Playwright Script)..."
          npx tsx scripts/run-scrape-all.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Sync Filmhouse (6 AM Local)
        if: github.event.schedule == '0 5 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'showtimes'))
        run: |
          echo "Syncing Filmhouse (Local API Script)..."
          npx tsx scripts/sync-filmhouse.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}

      - name: Sync YouTube Videos (Every 8 Hours)
        if: github.event.schedule == '0 */8 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'videos'))
        run: |
          echo "Syncing YouTube Videos (Local Action Script)..."
          npx tsx scripts/sync-youtube.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
          TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}

      - name: Sync TMDB & Feed Kappa (10 AM Local)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'tmdb' || github.event.inputs.task == 'feed_kappa'))
        run: |
          echo "Syncing TMDB (Vercel API)..."
          curl -v -X GET "$BASE_URL/api/cron/sync?task=tmdb" \
          -H "x-cron-secret: $CRON_SECRET"
          
          echo "Syncing Feed Kappa (Local Playwright Script)..."
          npx tsx scripts/sync_feed_kappa.ts
        continue-on-error: true
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEED_KAPPA_SITEMAP_URL: ${{ secrets.FEED_KAPPA_SITEMAP_URL }}
          FEED_KAPPA_BASE_URL: ${{ secrets.FEED_KAPPA_BASE_URL }}

      - name: Sync Feed Gamma (10 AM Local)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'feed_gamma'))
        run: |
          echo "Syncing Feed Gamma (Local Playwright Script)..."
          npx tsx scripts/sync_feed_gamma.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEED_GAMMA_URL: ${{ secrets.FEED_GAMMA_URL }}
          FEED_GAMMA_BASE_URL: ${{ secrets.FEED_GAMMA_BASE_URL }}
          FEED_GAMMA_CHANNEL_HANDLE: ${{ secrets.FEED_GAMMA_CHANNEL_HANDLE }}
          FEED_GAMMA_CHANNEL_NAME: ${{ secrets.FEED_GAMMA_CHANNEL_NAME }}

      - name: Sync Feed Zeta (10 AM Local)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'feed_zeta'))
        run: |
          echo "Syncing Feed Zeta (Local Playwright Script)..."
          npx tsx scripts/sync_feed_zeta.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # SmartProxy account disabled (billing) — feed zeta runs direct now
          FEED_ZETA_URL: ${{ secrets.FEED_ZETA_URL }}

      - name: Harvest Feed Delta (Daily)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'feed_delta'))
        run: |
          echo "Harvesting Feed Delta..."
          npx tsx scripts/harvest_feed_delta.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEED_DELTA_URL: ${{ secrets.FEED_DELTA_URL }}
          FEED_DELTA_BASE_URL: ${{ secrets.FEED_DELTA_BASE_URL }}

      - name: AI Maintenance (Extract Cast + Title Cleanup)
        if: github.event.schedule == '0 2,14 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'ai_maintenance'))
        run: |
          echo "Running AI Maintenance (Extract Cast → Title Cleanup)..."
          curl -v -X GET "$BASE_URL/api/cron/sync?task=ai_maintenance" \
          -H "x-cron-secret: $CRON_SECRET"
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install System and Python Dependencies for Local OCR
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'credits_enrichment' || github.event.inputs.task == 'ai_maintenance')
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr libgl1 libglib2.0-0
          python -m pip install --upgrade pip
          pip install yt-dlp paddleocr opencv-python-headless imagehash rapidfuzz pytesseract python-dotenv google-genai requests pillow
        continue-on-error: true

      - name: Run Hybrid Credit Enrichment (TMDB + Local OCR Fallback)
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'credits_enrichment' || github.event.inputs.task == 'ai_maintenance')
        run: |
          echo "Running local OCR Cast & Crew Extraction on incomplete YouTube videos..."
          npx tsx scripts/batch_enrich_credits.ts
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
