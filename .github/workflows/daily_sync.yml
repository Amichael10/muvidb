name: Lumi Data Sync

on:
  schedule:
    # 6:00 AM WAT (UTC+1) = 5:00 AM UTC (Cinemas - Daily)
    - cron: '0 5 * * *'
    # YouTube Sync: 3 times a day (every 8 hours)
    - cron: '0 */8 * * *'
    # 10:00 AM WAT (UTC+1) = 9:00 AM UTC (TMDB/Kava - Daily)
    - cron: '0 9 * * *'
    # AI Maintenance: Twice a day (every 12 hours)
    - cron: '0 2,14 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - showtimes
          - videos
          - tmdb
          - kava
          - iroko
          - filmflux
          - docuth
          - ai_maintenance
          - credits_enrichment

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      BASE_URL: 'https://muvidb.com'
      CRON_SECRET: ${{ secrets.VITE_CRON_SECRET }}
    
    steps:
      - name: Fix Git Permissions
        run: git config --global --add safe.directory "*"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify Environment
        run: |
          echo "Checking Secrets Presence..."
          if [ -z "$CRON_SECRET" ]; then echo "❌ CRON_SECRET is MISSING"; else echo "✅ CRON_SECRET is set"; fi
          if [ -z "${{ secrets.FIRECRAWL_API_KEY }}" ]; then echo "❌ FIRECRAWL_API_KEY is MISSING"; else echo "✅ FIRECRAWL_API_KEY is set"; fi
          echo "Base URL: $BASE_URL"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Sync Cinemas (6 AM Local)
        if: github.event.schedule == '0 5 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'showtimes'))
        run: |
          echo "Syncing Cinemas (Local Playwright Script)..."
          npx tsx scripts/run-scrape-all.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMARTPROXY_USER: ${{ secrets.SMARTPROXY_USER }}
          SMARTPROXY_PASS: ${{ secrets.SMARTPROXY_PASS }}
          SMARTPROXY_HOST: ${{ secrets.SMARTPROXY_HOST }}
          SMARTPROXY_PORT: ${{ secrets.SMARTPROXY_PORT }}

      - name: Sync YouTube Videos (Every 8 Hours)
        if: github.event.schedule == '0 */8 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'videos'))
        run: |
          echo "Syncing YouTube Videos (Vercel API)..."
          curl -v -X GET "$BASE_URL/api/cron/sync?task=videos" \
          -H "x-cron-secret: $CRON_SECRET"
        continue-on-error: true

      - name: Sync TMDB & Kava (10 AM Local)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'tmdb' || github.event.inputs.task == 'kava'))
        run: |
          echo "Syncing TMDB (Vercel API)..."
          curl -v -X GET "$BASE_URL/api/cron/sync?task=tmdb" \
          -H "x-cron-secret: $CRON_SECRET"
          
          echo "Syncing Kava (Local Playwright Script)..."
          npx tsx scripts/sync-kava.ts
        continue-on-error: true
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync IrokoTV (10 AM Local)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'iroko'))
        run: |
          echo "Syncing IrokoTV (Local Playwright Script)..."
          npx tsx scripts/iroko_sync.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync Docuth (10 AM Local)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'docuth'))
        run: |
          echo "Syncing Docuth (Local Playwright Script)..."
          npx tsx scripts/docuth_sync.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMARTPROXY_USER: ${{ secrets.SMARTPROXY_USER }}
          SMARTPROXY_PASS: ${{ secrets.SMARTPROXY_PASS }}
          SMARTPROXY_HOST: ${{ secrets.SMARTPROXY_HOST }}
          SMARTPROXY_PORT: ${{ secrets.SMARTPROXY_PORT }}

      - name: Harvest Filmflux (Daily)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'filmflux'))
        run: |
          echo "Harvesting Filmflux (Competitor Data)..."
          npx tsx scripts/filmflux_harvester.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: AI Maintenance (Extract Cast + Title Cleanup)
        if: github.event.schedule == '0 2,14 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'ai_maintenance'))
        run: |
          echo "Running AI Maintenance (Extract Cast → Title Cleanup)..."
          curl -v -X GET "$BASE_URL/api/cron/sync?task=ai_maintenance" \
          -H "x-cron-secret: $CRON_SECRET"
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install System and Python Dependencies for Local OCR
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'credits_enrichment' || github.event.inputs.task == 'ai_maintenance')
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr libgl1 libglib2.0-0
          python -m pip install --upgrade pip
          pip install yt-dlp paddleocr opencv-python-headless imagehash rapidfuzz pytesseract python-dotenv google-genai requests pillow
        continue-on-error: true

      - name: Run Hybrid Credit Enrichment (TMDB + Local OCR Fallback)
        if: github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'credits_enrichment' || github.event.inputs.task == 'ai_maintenance')
        run: |
          echo "Running local OCR Cast & Crew Extraction on incomplete YouTube videos..."
          npx tsx scripts/batch_enrich_credits.ts
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMARTPROXY_USER: ${{ secrets.SMARTPROXY_USER }}
          SMARTPROXY_PASS: ${{ secrets.SMARTPROXY_PASS }}
          SMARTPROXY_HOST: ${{ secrets.SMARTPROXY_HOST }}
          SMARTPROXY_PORT: ${{ secrets.SMARTPROXY_PORT }}
