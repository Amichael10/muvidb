name: Lumi Data Sync

on:
  schedule:
    # 6:00 AM WAT (UTC+1) = 5:00 AM UTC
    - cron: '0 5 * * *'
    # 8:00 AM WAT (UTC+1) = 7:00 AM UTC
    - cron: '0 7 * * *'
    # 10:00 AM WAT (UTC+1) = 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - showtimes
          - videos
          - tmdb
          - kava

jobs:
  sync:
    runs-on: ubuntu-22.04
    env:
      BASE_URL: 'https://lumi-rho-seven.vercel.app/'
      CRON_SECRET: ${{ secrets.VITE_CRON_SECRET }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Fix Git Permissions
        run: git config --global --add safe.directory "*"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify Environment
        run: |
          echo "Checking Secrets Presence..."
          if [ -z "$CRON_SECRET" ]; then echo "❌ CRON_SECRET is MISSING"; else echo "✅ CRON_SECRET is set"; fi
          if [ -z "${{ secrets.FIRECRAWL_API_KEY }}" ]; then echo "❌ FIRECRAWL_API_KEY is MISSING"; else echo "✅ FIRECRAWL_API_KEY is set"; fi
          echo "Base URL: $BASE_URL"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js node-fetch

      - name: Sync Cinemas (6 AM Local)
        if: github.event.schedule == '0 5 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'showtimes'))
        run: |
          echo "Syncing Cinemas..."
          curl -v -X GET "$BASE_URL/api/cron/sync?task=showtimes" \
          -H "x-cron-secret: $CRON_SECRET"
        continue-on-error: true

      - name: Sync YouTube Videos (8 AM Local)
        if: github.event.schedule == '0 7 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'videos'))
        run: |
          echo "Syncing YouTube Videos..."
          curl -v -X GET "$BASE_URL/api/cron/sync?task=videos" \
          -H "x-cron-secret: $CRON_SECRET"
        continue-on-error: true

      - name: Sync TMDB & Kava (10 AM Local)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'tmdb' || github.event.inputs.task == 'kava'))
        run: |
          echo "Syncing TMDB..."
          curl -v -X GET "$BASE_URL/api/cron/sync?task=tmdb" \
          -H "x-cron-secret: $CRON_SECRET"
          
          echo "Syncing Kava (Local Script)..."
          node scripts/sync-kava.mjs
        continue-on-error: true
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
