<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <title>403</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">


<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #161616;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        text-align: center;
    }

    .container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    h1 {
        font-size: 24px;
        font-weight: 500;
        margin-bottom: 12px;
    }

    p {
        font-size: 14px;
        color: #aaaaaa;
        max-width: 420px;
        line-height: 1.6;
        margin-bottom: 24px;
    }

    .code {
        font-size: 18px;
        color: #7f7878;
        margin-bottom: 24px;
    }

    a {
        text-decoration: none;
        color: #ffffff;
        border: 1px solid #ffffff;
        padding: 10px 22px;
        border-radius: 6px;
        font-size: 14px;
        transition: all 0.3s ease;
    }

    a:hover {
        background-color: #ffffff;
        color: #161616;
    }

    .footer {
        padding: 15px;
        font-size: 12px;
        color: #aca8a8;
    }

    @media (max-width: 480px) {
        h1 {
            font-size: 20px;
        }

        p {
            font-size: 13px;
        }

        a {
            width: 100%;
            max-width: 260px;
        }
    }
</style>


</head>

<body>


<div class="container">
    <h1>Access Denied</h1>

    <p>
        You don’t have permission to access this page. Please check your access rights or return to the homepage.
    </p>

    <div class="code">Error 403</div>

    
</div>

<div class="footer">
    Cinema Solution By CINEsync
</div>




</body></html>
