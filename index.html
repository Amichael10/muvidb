<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FF5C00" />

    <!-- Speed up the first image/data round-trips (Core Web Vitals) -->
    <link rel="preconnect" href="https://pkenrmorywmuvnzfoylp.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://pkenrmorywmuvnzfoylp.supabase.co" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://www.partyjolloftv.com" />
    
    <!-- Google Fonts Preconnect and Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="MuviDB" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- HTML Meta Tags -->
    <title>MuviDB | The Ultimate African Film & Entertainment Database</title>
    <meta name="description" content="Every film. Every credit. Explore African cinema, discover talent, track releases, and connect with the people behind the stories.">

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://muvidb.com/">
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MuviDB | The Ultimate African Film & Entertainment Database" />
    <meta property="og:description" content="Every film. Every credit. Explore African cinema, discover talent, track releases, and connect with the people behind the stories.">
    <meta property="og:image" content="https://muvidb.com/images/MuviDB%20Brand/og-image.png" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="twitter:domain" content="muvidb.com" />
    <meta property="twitter:url" content="https://muvidb.com/">
    <meta name="twitter:title" content="MuviDB | The Ultimate African Film & Entertainment Database" />
    <meta name="twitter:description" content="Every film. Every credit. Explore African cinema, discover talent, track releases, and connect with the people behind the stories.">
    <meta name="twitter:image" content="https://muvidb.com/images/MuviDB%20Brand/og-image.png" />

    <!-- Site-level structured data (enables sitelinks search box + brand entity) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MuviDB",
      "url": "https://muvidb.com/",
      "logo": "https://muvidb.com/images/MuviDB%20Brand/og-image.png",
      "description": "The home of Nollywood — every film, every credit, and where to watch."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MuviDB",
      "url": "https://muvidb.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": { "@type": "EntryPoint", "urlTemplate": "https://muvidb.com/search?q={search_term_string}" },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
